<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMind — Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Back button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            background: var(--secondary-color);
            border: none;
            border-radius: 100px;
            color: var(--text-secondary-color);
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .back-btn:hover {
            background: var(--secondary-hover-color);
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="back-btn">
            <i class='bx bx-arrow-back'></i>
            Home
        </a>

        <span class="navbar__logo">NovaMind</span>

        <button id="themeToggler" class="navbar__button" title="Toggle theme">
            <i class="bx bx-sun"></i>
        </button>
    </nav>

    <!-- Header / Welcome screen (hidden once chat starts) -->
    <header class="header">
        <div class="header__title">
            <h1>Hello, there.</h1>
            <h2>What can I solve for you?</h2>
        </div>

        <div class="suggests">
            <div class="suggests__item">
                <p class="suggests__item-text">Explain quantum computing in simple terms</p>
                <span class="suggests__item-icon"><i class='bx bx-atom'></i></span>
            </div>
            <div class="suggests__item">
                <p class="suggests__item-text">Debug my Python code and explain the fix</p>
                <span class="suggests__item-icon"><i class='bx bx-code-curly'></i></span>
            </div>
            <div class="suggests__item">
                <p class="suggests__item-text">Write a professional email to my client</p>
                <span class="suggests__item-icon"><i class='bx bx-envelope'></i></span>
            </div>
            <div class="suggests__item">
                <p class="suggests__item-text">Give me a step-by-step plan to learn React</p>
                <span class="suggests__item-icon"><i class='bx bx-book-open'></i></span>
            </div>
        </div>
    </header>

    <!-- Chat messages -->
    <div class="chats"></div>

    <!-- Prompt bar -->
    <section class="prompt">
        <form class="prompt__form" action="#">
            <div class="prompt__input-wrapper">
                <input
                    type="text"
                    required
                    placeholder="Ask me anything…"
                    class="prompt__form-input"
                    autocomplete="off"
                >
                <button type="button" id="deleteButton" class="prompt__form-button" title="Clear chat">
                    <i class='bx bx-trash'></i>
                </button>
                <button type="submit" id="sendButton" class="prompt__form-button" title="Send">
                    <i class='bx bx-send'></i>
                </button>
            </div>
        </form>
        <p class="prompt__disclaim">NovaMind may make mistakes. Verify important information.</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
